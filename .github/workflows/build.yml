name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build extension
        run: ./gradlew :CrunchyrollProvider:make

      - name: Upload .cs3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrunchyrollProvider
          path: CrunchyrollProvider/build/CrunchyrollProvider.cs3
          if-no-files-found: error

      # ── Release (only on version tags, e.g. v1.0.0) ────────────────────────
      - name: Generate plugins.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew makePluginsJson

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CrunchyrollProvider/build/CrunchyrollProvider.cs3
            builds/plugins.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
